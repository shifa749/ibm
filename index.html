<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f7fb;
color:#333;
transition:.3s;
}

.dark{
background:#1d1d1d;
color:white;
}

header{
background:#4f46e5;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
}

.dark .card{
background:#2d2d2d;
}

.card h2{
margin-bottom:10px;
color:#4f46e5;
}

.subject{
padding:12px;
background:#eef2ff;
margin:10px 0;
border-radius:8px;
}

.dark .subject{
background:#444;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

li{
margin:8px 0;
}

.timer{
font-size:50px;
text-align:center;
margin:20px 0;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
color:gray;
}
</style>
</head>

<body>

<header>
<h1>📚 Study Hub</h1>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h2>Subjects</h2>

<div class="subject">📖 Mathematics</div>
<div class="subject">💻 Computer Science</div>
<div class="subject">🧪 Physics</div>
<div class="subject">🌍 Geography</div>

</div>

<div class="card">
<h2>Today's Tasks</h2>

<input id="taskInput" placeholder="Add task">

<button onclick="addTask()" style="margin-top:10px;background:#4f46e5;color:white;">
Add Task
</button>

<ul id="tasks"></ul>

</div>

<div class="card">

<h2>Pomodoro Timer</h2>

<div class="timer" id="timer">
25:00
</div>

<button onclick="startTimer()" style="background:#10b981;color:white;">
Start
</button>

<button onclick="resetTimer()" style="background:#ef4444;color:white;">
Reset
</button>

</div>

<div class="card">

<h2>Study Planner</h2>

<textarea style="width:100%;height:180px;padding:10px;border-radius:10px;"
placeholder="Write today's study plan..."></textarea>

</div>

</div>

</div>

<footer>
Made with ❤️ for Students
</footer>

<script>

function toggleDark(){
document.body.classList.toggle("dark");
}

function addTask(){

let input=document.getElementById("taskInput");

if(input.value=="") return;

let li=document.createElement("li");

li.innerHTML="<input type='checkbox'> "+input.value;

document.getElementById("tasks").appendChild(li);

input.value="";
}

let total=1500;
let interval;

function startTimer(){

clearInterval(interval);

interval=setInterval(()=>{

if(total<=0){
clearInterval(interval);
alert("Time's up!");
return;
}

total--;

let m=Math.floor(total/60);
let s=total%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

},1000);

}

function resetTimer(){

clearInterval(interval);

total=1500;

document.getElementById("timer").innerHTML="25:00";

}

</script>

</body>
</html>
